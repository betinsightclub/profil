<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetInsight – Freigeschaltete Tipps</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    background:
      radial-gradient(circle at top, rgba(0, 200, 255, 0.10), transparent 35%),
      linear-gradient(180deg, #061923 0%, #071d2b 45%, #04131c 100%);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  .floating-back-btn {
    position: fixed;
    left: 18px;
    bottom: 18px;
    z-index: 9999;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(90deg, #16a8ff, #00c8ff);
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    padding: 13px 20px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    box-shadow: 0 12px 30px rgba(0, 174, 255, 0.35);
  }

  .page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 35px 18px 90px;
  }

  .logo {
    width: 155px;
    max-width: 70%;
    height: auto;
    margin: 8px 0 24px;
  }

  h1 {
    margin: 8px 0 8px;
    font-size: 34px;
  }

  .subtitle {
    color: #b8d7e8;
    margin-bottom: 34px;
    font-size: 16px;
  }

  .status {
    color: #8fd3ff;
    margin: 25px 0;
  }

  .tips-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    align-items: start;
  }

  .tip-card {
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(16, 72, 91, 0.98), rgba(9, 51, 68, 0.98));
    border: 1px solid rgba(35, 190, 255, 0.48);
    border-radius: 18px;
    padding: 20px 18px;
    box-shadow:
      0 14px 32px rgba(0,0,0,0.34),
      inset 0 1px 0 rgba(255,255,255,0.06);
    width: 100%;
    text-align: left;
  }

  .tip-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top right, rgba(0, 200, 255, 0.13), transparent 35%);
    pointer-events: none;
  }

  .tip-inner {
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-block;
    background: rgba(0, 255, 180, 0.14);
    border: 1px solid rgba(0, 255, 180, 0.35);
    color: #bfffe8;
    border-radius: 999px;
    padding: 5px 10px;
    font-size: 12px;
    margin-bottom: 12px;
  }

  .missing-badge {
    background: rgba(255, 179, 71, 0.14);
    border-color: rgba(255, 179, 71, 0.45);
    color: #ffd08a;
  }

  .tip-card h2 {
    margin: 0 0 16px;
    font-size: 21px;
    line-height: 1.25;
    text-align: center;
  }

  .tip-meta {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    color: #e4f7ff;
    font-size: 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
    border-bottom: 2px solid #19c8f5;
    padding: 12px 0;
    margin-bottom: 16px;
  }

  .meta-item {
    background: rgba(255,255,255,0.04);
    border-radius: 9px;
    padding: 6px 8px;
  }

  .detail-row {
    margin: 8px 0;
    line-height: 1.45;
    font-size: 14px;
  }

  details {
    margin-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.14);
    padding-top: 14px;
  }

  summary {
    cursor: pointer;
    font-weight: 700;
    color: #8fffd2;
    list-style: none;
  }

  summary::-webkit-details-marker {
    display: none;
  }

  .analysis-text {
    margin-top: 14px;
    white-space: pre-wrap;
    line-height: 1.6;
    font-size: 14px;
    color: #e8f8ff;
  }

  .empty,
  .error {
    max-width: 790px;
    margin: 0 auto;
    border-radius: 18px;
    padding: 24px;
  }

  .empty {
    background: #0f3040;
    color: #c9e8f5;
  }

  .error {
    background: #3d1e25;
    color: #ffd7d7;
    border: 1px solid #ff6b6b;
    white-space: pre-wrap;
    text-align: left;
  }

  @media (max-width: 1100px) {
    .tips-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  @media (max-width: 820px) {
    .tips-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 600px) {
    .floating-back-btn {
      left: 12px;
      right: 12px;
      bottom: 12px;
      width: auto;
    }

    .page {
      padding: 28px 14px 95px;
    }

    h1 {
      font-size: 27px;
    }

    .tips-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<body>

<a class="floating-back-btn" href="https://betinsight.systeme.io/school/course/mitglieder/lecture/9732838">
  ⬅ Mitgliederbereich
</a>

<div class="page">
  <img src="../logo_betisight.club.png" alt="BetInsight Club" class="logo">

  <h1>✅ Freigeschaltete Tipps</h1>
  <p class="subtitle">Hier findest du alle Tipps, die du bereits freigeschaltet hast.</p>

  <div id="status" class="status">Freigeschaltete Tipps werden geladen...</div>
  <div id="tips" class="tips-grid"></div>
</div>

<script>
const FREIGESCHALTETE_TIPPS_WEBHOOK = "https://hook.eu1.make.com/7q3edcra1gwxd7vvklv4l7gdxn7zbihr";

function getToken() {
  const params = new URLSearchParams(window.location.search);
  return params.get("token") || "";
}

function safeText(value, fallback = "-") {
  if (value === null || value === undefined || value === "") return fallback;
  return String(value);
}

function escapeHtml(value) {
  return safeText(value, "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatFreischaltDatum(value) {
  if (!value) return "-";

  const d = new Date(value);

  if (isNaN(d.getTime())) {
    return escapeHtml(value);
  }

  const datum =
    String(d.getDate()).padStart(2, "0") + "." +
    String(d.getMonth() + 1).padStart(2, "0") + "." +
    d.getFullYear();

  const uhrzeit =
    String(d.getHours()).padStart(2, "0") + ":" +
    String(d.getMinutes()).padStart(2, "0");

  return datum + "<br>" + uhrzeit + " Uhr";
}

function parseWebhookJson(rawText) {
  let cleaned = String(rawText).replace(/^\uFEFF/, "").trim();

  const firstBracket = cleaned.indexOf("[");
  const lastBracket = cleaned.lastIndexOf("]");

  if (firstBracket !== -1 && lastBracket !== -1 && lastBracket > firstBracket) {
    cleaned = cleaned.substring(firstBracket, lastBracket + 1).trim();
  }

  return JSON.parse(cleaned);
}

function normalizeTip(item) {
  return {
    datum: item["2"],
    preis_units: item["3"],
    spiel: item["7"],
    tipp: item["8"],
    quote: item["9"],
    ersteller: item["10"],
    liga: item["11"],
    markt: item["12"],
    spiel_datum: item["13"],
    anpfiff: item["14"],
    analyse: item["15"]
  };
}

function parseDateForSorting(value) {
  if (!value) return 0;

  const date = new Date(value);
  if (!isNaN(date.getTime())) return date.getTime();

  const parts = String(value).match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (parts) {
    return new Date(parts[3], parts[2] - 1, parts[1]).getTime();
  }

  return 0;
}

function createTipCard(tipp) {
  const card = document.createElement("div");
  card.className = "tip-card";

  const hasFullData = Boolean(tipp.spiel || tipp.tipp || tipp.analyse);
  const title = tipp.spiel || "Alter freigeschalteter Tipp";
  const badgeClass = hasFullData ? "badge" : "badge missing-badge";
  const badgeText = hasFullData ? "✅ Freigeschaltet" : "⚠️ Details fehlen";

  card.innerHTML = `
    <div class="tip-inner">
      <div class="${badgeClass}">${badgeText}</div>

      <h2>${escapeHtml(title)}</h2>

      <div class="tip-meta">
        <span class="meta-item">🏆 ${escapeHtml(tipp.liga)}</span>
        <span class="meta-item">📅 ${escapeHtml(tipp.spiel_datum)}</span>
        <span class="meta-item">⏰ ${escapeHtml(tipp.anpfiff)}</span>
        <span class="meta-item">📊 ${escapeHtml(tipp.markt)}</span>
        <span class="meta-item">📈 Quote ${escapeHtml(tipp.quote)}</span>
      </div>

      <p class="detail-row"><strong>Tipp:</strong> ${escapeHtml(tipp.tipp)}</p>
      <p class="detail-row"><strong>Preis:</strong> ${escapeHtml(tipp.preis_units)} Units</p>
      <p class="detail-row"><strong>Ersteller:</strong> ${escapeHtml(tipp.ersteller)}</p>
      <p class="detail-row"><strong>Freigeschaltet am:</strong><br>${formatFreischaltDatum(tipp.datum)}</p>

      <details>
        <summary>Analyse anzeigen</summary>
        <div class="analysis-text">
${escapeHtml(tipp.analyse || "Für diesen älteren Eintrag wurden noch keine Detaildaten gespeichert.")}
        </div>
      </details>
    </div>
  `;

  return card;
}

async function loadFreigeschalteteTipps() {
  const token = getToken();
  const statusBox = document.getElementById("status");
  const tipsBox = document.getElementById("tips");

  if (!token) {
    statusBox.style.display = "none";
    tipsBox.innerHTML = `
      <div class="error">
Kein Token gefunden.

Bitte öffne diese Seite über deinen persönlichen BetInsight-Link.
      </div>
    `;
    return;
  }

  try {
    const url =
      FREIGESCHALTETE_TIPPS_WEBHOOK +
      "?token=" + encodeURIComponent(token) +
      "&cachebuster=" + Date.now();

    const response = await fetch(url, {
      method: "GET",
      cache: "no-store"
    });

    const rawText = await response.text();

    if (!response.ok) {
      throw new Error("HTTP Fehler: " + response.status + "\n\nAntwort:\n" + rawText);
    }

    const rawTipps = parseWebhookJson(rawText);

    statusBox.style.display = "none";
    tipsBox.innerHTML = "";

    if (!Array.isArray(rawTipps) || rawTipps.length === 0) {
      tipsBox.innerHTML = `
        <div class="empty">
          Du hast bisher noch keine Tipps freigeschaltet.
        </div>
      `;
      return;
    }

    const tipps = rawTipps
      .map(normalizeTip)
      .sort((a, b) => parseDateForSorting(b.datum) - parseDateForSorting(a.datum));

    tipps.forEach(tipp => {
      tipsBox.appendChild(createTipCard(tipp));
    });

  } catch (error) {
    statusBox.style.display = "none";
    tipsBox.innerHTML = `
      <div class="error">
Fehler beim Laden deiner freigeschalteten Tipps:

${escapeHtml(error.message)}
      </div>
    `;
    console.error(error);
  }
}

loadFreigeschalteteTipps();
</script>

</body>
</html>
