<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetInsight Profil</title>
</head>

<body style="margin:0;background:#001b24;color:white;font-family:Arial,sans-serif;text-align:center;min-height:100vh;">

  <div style="max-width:760px;margin:0 auto;padding:45px 20px;">

    <img
      src="logo_betisight.club.png"
      alt="BetInsight Club"
      style="width:170px;max-width:70%;height:auto;margin-bottom:35px;"
    >

    <div style="font-size:48px;margin-bottom:15px;">👤</div>

    <h1 style="font-size:34px;margin:0 0 45px 0;">
      Mein BetInsight Profil
    </h1>

    <div style="font-size:34px;margin-bottom:28px;">
      Aktuelle Units:
      <span id="units" style="font-size:62px;font-weight:bold;color:white;">0</span>
    </div>

    <div style="font-size:20px;margin-bottom:22px;">
      <strong>E-Mail:</strong>
      <span id="email">Lade...</span>
    </div>

    <div style="max-width:620px;margin:0 auto 26px auto;background:#04263a;padding:22px;border-radius:14px;">
      <div style="font-size:18px;font-weight:bold;margin-bottom:10px;color:#00ff99;">
        Dein persönlicher Profil-Link
      </div>

      <p style="font-size:14px;line-height:1.5;color:#c9d6df;margin:0 0 14px 0;">
        Speichere diesen Link. Darüber kommst du immer direkt zu deinem eigenen BetInsight-Profil.
      </p>

      <input
        id="profileLink"
        readonly
        value=""
        style="width:100%;padding:12px;font-size:14px;box-sizing:border-box;background:white;color:black;border:2px solid #008cff;border-radius:8px;text-align:center;"
      >

      <button
        onclick="copyProfileLink()"
        style="margin-top:12px;padding:12px 22px;border:none;border-radius:8px;background:#5f7488;color:white;font-size:15px;cursor:pointer;"
      >
        🔗 Profil-Link kopieren
      </button>
    </div>

    <div id="message" style="color:#ffcc00;font-size:16px;margin-bottom:30px;">
      Kontostand wird geladen...
    </div>

    <button
      onclick="loadUnits()"
      style="padding:15px 30px;border:none;border-radius:8px;background:#007bff;color:white;font-size:18px;cursor:pointer;margin-bottom:18px;"
    >
      🔄 Kontostand aktualisieren
    </button>

    <br>

    <button
      onclick="goBuyUnits()"
      style="padding:15px 30px;border:none;border-radius:8px;background:#00a86b;color:white;font-size:18px;cursor:pointer;margin-bottom:18px;"
    >
      💎 Units kaufen
    </button>

    <br>

    <button
      onclick="forgetToken()"
      style="padding:10px 22px;border:none;border-radius:8px;background:#7a2e2e;color:white;font-size:14px;cursor:pointer;margin-bottom:45px;"
    >
      Zugangscode auf diesem Gerät löschen
    </button>

    <hr style="border:0;border-top:1px solid rgba(255,255,255,0.25);margin:10px auto 35px auto;max-width:620px;">

    <button
      onclick="window.location.href='https://betinsight.systeme.io/school/course/mitglieder/lecture/9870726'"
      style="padding:15px 32px;border:none;border-radius:8px;background:#5f7488;color:white;font-size:18px;cursor:pointer;"
    >
      ⬅ Zurück zum Backoffice
    </button>

    <div id="debug" style="margin-top:35px;color:rgba(255,255,255,0.35);font-size:12px;"></div>

    <div style="margin-top:45px;color:rgba(255,255,255,0.45);font-size:14px;">
      © 2026 BetInsight Club
    </div>

  </div>

  <script>
    const PROFILE_WEBHOOK_URL = "https://hook.eu1.make.com/h51f7yyocer340kadcpp078uwcy2svbq";
    const TOKEN_STORAGE_KEY = "betinsight_profile_token";

    function normalizeToken(token) {
      if (!token) {
        return "";
      }

      const cleanedToken = token.trim();

      if (cleanedToken === "") {
        return "";
      }

      if (cleanedToken.startsWith("BI-")) {
        return cleanedToken;
      }

      return "BI-" + cleanedToken;
    }

    function getTokenFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token");
    }

    function getSavedToken() {
      return localStorage.getItem(TOKEN_STORAGE_KEY);
    }

    function saveToken(token) {
      const normalizedToken = normalizeToken(token);

      if (normalizedToken !== "") {
        localStorage.setItem(TOKEN_STORAGE_KEY, normalizedToken);
      }
    }

    function getActiveToken() {
      const tokenFromUrl = getTokenFromUrl();

      if (tokenFromUrl && tokenFromUrl.trim() !== "") {
        const normalizedToken = normalizeToken(tokenFromUrl);
        saveToken(normalizedToken);
        return normalizedToken;
      }

      return normalizeToken(getSavedToken());
    }

    function buildProfileLink(token) {
      const normalizedToken = normalizeToken(token);

      if (normalizedToken === "") {
        return "";
      }

      return "https://betinsightclub.github.io/profil/?token=" + encodeURIComponent(normalizedToken);
    }

    function updateProfileLink(token) {
      const profileLinkInput = document.getElementById("profileLink");
      const profileLink = buildProfileLink(token);

      profileLinkInput.value = profileLink;
    }

    function copyProfileLink() {
      const profileLinkInput = document.getElementById("profileLink");

      if (!profileLinkInput.value) {
        alert("Noch kein Profil-Link vorhanden. Bitte öffne zuerst deinen persönlichen Profil-Link.");
        return;
      }

      profileLinkInput.select();
      profileLinkInput.setSelectionRange(0, 99999);

      navigator.clipboard.writeText(profileLinkInput.value)
        .then(() => {
          alert("Profil-Link wurde kopiert.");
        })
        .catch(() => {
          alert("Kopieren nicht möglich. Bitte markiere den Link manuell.");
        });
    }

    function setUnitColor(units) {
      const unitsElement = document.getElementById("units");

      if (units === 0) {
        unitsElement.style.color = "red";
      } else if (units < 10) {
        unitsElement.style.color = "orange";
      } else {
        unitsElement.style.color = "lime";
      }
    }

    function setDebug(text) {
      document.getElementById("debug").innerText = text;
    }

    function loadUnits() {
      const token = getActiveToken();

      updateProfileLink(token);

      if (!token) {
        document.getElementById("units").innerText = "0";
        document.getElementById("email").innerText = "Kein Zugangscode";
        document.getElementById("message").innerText =
          "Bitte öffne einmal deinen persönlichen BetInsight-Profil-Link.";
        setUnitColor(0);
        setDebug("Debug: Kein Token aktiv.");
        return;
      }

      document.getElementById("message").innerText = "Kontostand wird geladen...";

      fetch(PROFILE_WEBHOOK_URL + "?token=" + encodeURIComponent(token))
        .then(response => response.json())
        .then(data => {
          if (!data || data.found === false || !data.email) {
            document.getElementById("units").innerText = "0";
            document.getElementById("email").innerText = "Nicht gefunden";
            document.getElementById("message").innerText =
              "Zugangscode wurde nicht gefunden.";
            setUnitColor(0);
            setDebug("Debug: Token aktiv: " + token + " | API: nicht gefunden oder leer");
            return;
          }

          const units = parseInt(data.units) || 0;

          document.getElementById("units").innerText = units;
          document.getElementById("email").innerText = data.email;
          document.getElementById("message").innerText = "Aktualisiert.";

          setUnitColor(units);
          updateProfileLink(data.token || token);

          setDebug(
            "Debug: Token aktiv: " + token +
            " | API Token: " + (data.token || "leer") +
            " | API E-Mail: " + (data.email || "leer") +
            " | API Units: " + (data.units || "0")
          );
        })
        .catch(error => {
          console.error(error);

          document.getElementById("units").innerText = "Fehler";
          document.getElementById("email").innerText = "Fehler";
          document.getElementById("message").innerText =
            "Kontostand konnte nicht geladen werden.";
          setDebug("Debug: Fehler beim Laden.");
        });
    }

    function goBuyUnits() {
      const token = getActiveToken();

      if (!token) {
        alert("Kein Zugangscode gefunden. Bitte öffne zuerst deinen persönlichen Profil-Link.");
        return;
      }

      window.location.href =
        "https://betinsightclub.github.io/profil/kaufen/?token=" + encodeURIComponent(token);
    }

    function forgetToken() {
      localStorage.removeItem(TOKEN_STORAGE_KEY);
      localStorage.removeItem("betinsight_email");

      document.getElementById("units").innerText = "0";
      document.getElementById("email").innerText = "Kein Zugangscode";
      document.getElementById("message").innerText =
        "Zugangscode wurde auf diesem Gerät gelöscht.";
      document.getElementById("profileLink").value = "";
      setUnitColor(0);
      setDebug("Debug: Zugangscode gelöscht.");
    }

    loadUnits();
  </script>

</body>
</html>
