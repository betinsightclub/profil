<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetInsight – Freigeschaltete Tipps</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    background:
      radial-gradient(circle at top, rgba(0, 200, 255, 0.10), transparent 35%),
      linear-gradient(180deg, #061923 0%, #071d2b 45%, #04131c 100%);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  .floating-back-btn {
    position: fixed;
    left: 18px;
    bottom: 18px;
    z-index: 9999;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(90deg, #16a8ff, #00c8ff);
    color: #ffffff;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    padding: 13px 20px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    box-shadow: 0 12px 30px rgba(0, 174, 255, 0.35);
  }

  .page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 35px 18px 90px;
  }

  .logo { width:155px; max-width:70%; margin:8px 0 24px; }

  h1 { margin:8px 0; font-size:34px; }

  .subtitle { color:#b8d7e8; margin-bottom:34px; }

  .status { color:#8fd3ff; margin:25px 0; }

  .tips-grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
  }

  .tip-card {
    background:linear-gradient(180deg, rgba(16,72,91,.98), rgba(9,51,68,.98));
    border:1px solid rgba(35,190,255,.48);
    border-radius:18px;
    padding:20px 18px;
  }

  @media (max-width:1100px){.tips-grid{grid-template-columns:repeat(3,1fr)}}
  @media (max-width:820px){.tips-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:600px){
    .tips-grid{grid-template-columns:1fr}
    .floating-back-btn{left:12px;right:12px;bottom:12px}
  }
</style>
</head>
<body>

<a class="floating-back-btn" href="https://betinsight.systeme.io/school/course/mitglieder/lecture/9870726">
⬅ Mitgliederbereich
</a>

<div class="page">
<img src="../logo_betisight.club.png" class="logo" alt="BetInsight Club">
<h1>✅ Freigeschaltete Tipps</h1>
<p class="subtitle">Hier findest du alle Tipps, die du bereits freigeschaltet hast.</p>

<div id="status" class="status">Freigeschaltete Tipps werden geladen...</div>
<div id="tips" class="tips-grid"></div>
</div>

</script>

</body>
</html>
