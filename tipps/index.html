<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetInsight Tipps</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background:
      radial-gradient(circle at top, rgba(0, 200, 255, 0.10), transparent 35%),
      linear-gradient(180deg, #061923 0%, #071d2b 45%, #04131c 100%);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 18px 70px;
  }

  .topbar {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 22px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(15, 65, 82, 0.9);
    color: #d9f5ff;
    border: 1px solid rgba(35, 190, 255, 0.45);
    border-radius: 12px;
    padding: 11px 18px;
    text-decoration: none;
    font-size: 14px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.22);
  }

  .back-btn:hover {
    background: rgba(22, 168, 255, 0.22);
  }

  .logo {
    width: 155px;
    max-width: 70%;
    height: auto;
    margin: 8px 0 28px;
  }

  h1 {
    margin: 8px 0 8px;
    font-size: 34px;
    letter-spacing: 0.2px;
  }

  .subtitle {
    color: #b8d7e8;
    margin-bottom: 38px;
    font-size: 16px;
  }

  .status {
    color: #8fd3ff;
    margin: 25px 0;
  }

  .tips-grid {
    display: grid;
    gap: 30px;
  }

  .tip-card {
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(16, 72, 91, 0.98), rgba(9, 51, 68, 0.98));
    border: 1px solid rgba(35, 190, 255, 0.48);
    border-radius: 24px;
    padding: 34px 28px;
    box-shadow:
      0 18px 42px rgba(0,0,0,0.38),
      inset 0 1px 0 rgba(255,255,255,0.06);
    max-width: 790px;
    width: 100%;
    margin: 0 auto;
  }

  .tip-card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top right, rgba(0, 200, 255, 0.16), transparent 35%);
    pointer-events: none;
  }

  .tip-inner {
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-block;
    background: rgba(0, 200, 255, 0.14);
    border: 1px solid rgba(0, 200, 255, 0.35);
    color: #bff3ff;
    border-radius: 999px;
    padding: 6px 13px;
    font-size: 13px;
    margin-bottom: 16px;
  }

  .tip-card h2 {
    margin: 0 0 22px;
    font-size: 31px;
    line-height: 1.25;
  }

  .tip-meta {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 14px 18px;
    color: #e4f7ff;
    font-size: 15px;
    border-top: 1px solid rgba(255,255,255,0.08);
    border-bottom: 2px solid #19c8f5;
    padding: 18px 0;
    margin-bottom: 20px;
  }

  .meta-item {
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 7px 10px;
  }

  .locked {
    color: #a9c9d8;
    font-size: 14px;
    margin: 16px 0;
  }

  .price {
    font-size: 26px;
    margin: 17px 0 22px;
    font-weight: bold;
  }

  .btn {
    display: inline-block;
    background: linear-gradient(90deg, #16a8ff, #00c8ff);
    color: white;
    text-decoration: none;
    border: none;
    border-radius: 14px;
    padding: 15px 44px;
    font-size: 16px;
    cursor: pointer;
    min-width: 245px;
    box-shadow: 0 12px 28px rgba(0, 174, 255, 0.32);
  }

  .btn:hover {
    opacity: 0.93;
    transform: translateY(-1px);
  }

  .small-note {
    color: #b8d7e8;
    font-size: 13px;
    margin-top: 15px;
  }

  .empty,
  .error {
    max-width: 790px;
    margin: 0 auto;
    border-radius: 18px;
    padding: 24px;
  }

  .empty {
    background: #0f3040;
    color: #c9e8f5;
  }

  .error {
    background: #3d1e25;
    color: #ffd7d7;
    border: 1px solid #ff6b6b;
    white-space: pre-wrap;
    text-align: left;
  }

  @media (max-width: 600px) {
    .page {
      padding: 22px 14px 50px;
    }

    .topbar {
      justify-content: center;
    }

    h1 {
      font-size: 27px;
    }

    .tip-card {
      padding: 28px 18px;
    }

    .tip-card h2 {
      font-size: 24px;
    }

    .btn {
      width: 100%;
      min-width: unset;
    }
  }
</style>
</head>

<body>
  <div class="page">

    <div class="topbar">
      <a class="back-btn" href="https://betinsight.systeme.io/school/course/mitglieder/lecture/9732838">
        ⬅ Zurück zum Mitgliederbereich
      </a>
    </div>

    <img src="../logo_betisight.club.png" alt="BetInsight Club" class="logo">

    <h1>🔥 Neue BetInsight Tipps</h1>
    <p class="subtitle">Hier siehst du alle aktuell veröffentlichten Tipps als Vorschau.</p>

    <div id="status" class="status">Tipps werden geladen...</div>
    <div id="tips" class="tips-grid"></div>
  </div>

<script>
const TIPPS_WEBHOOK = "https://hook.eu1.make.com/36gm8kvlfcb7jwae8ypxe8oripquonq5";

function safeText(value, fallback = "-") {
  if (value === null || value === undefined || value === "") return fallback;
  return String(value);
}

function formatDate(value) {
  if (!value) return "-";

  const date = new Date(value);
  if (!isNaN(date.getTime())) {
    return date.toLocaleDateString("de-DE");
  }

  return value;
}

function parseWebhookJson(rawText) {
  let cleaned = String(rawText).replace(/^\uFEFF/, "").trim();

  const firstBracket = cleaned.indexOf("[");
  const lastBracket = cleaned.lastIndexOf("]");

  if (firstBracket === -1 || lastBracket === -1 || lastBracket <= firstBracket) {
    throw new Error("Keine gültige JSON-Liste gefunden.\n\nAntwort vom Webhook:\n" + rawText);
  }

  cleaned = cleaned.substring(firstBracket, lastBracket + 1).trim();

  return JSON.parse(cleaned);
}

function createTipCard(tipp) {
  const card = document.createElement("div");
  card.className = "tip-card";

  const tippId = safeText(tipp.tipp_id, "");
  const spiel = safeText(tipp.spiel);
  const liga = safeText(tipp.liga);
  const markt = safeText(tipp.markt);
  const quote = safeText(tipp.quote);
  const preisUnits = safeText(tipp.preis_units);
  const spielDatum = formatDate(tipp.spiel_datum);
  const anpfiff = safeText(tipp.anpfiff);

  card.innerHTML = `
    <div class="tip-inner">
      <div class="badge">🔒 Premium-Vorschau</div>

      <h2>${spiel}</h2>

      <div class="tip-meta">
        <span class="meta-item">🏆 ${liga}</span>
        <span class="meta-item">📅 ${spielDatum}</span>
        <span class="meta-item">⏰ ${anpfiff}</span>
        <span class="meta-item">📊 ${markt}</span>
        <span class="meta-item">📈 Quote ${quote}</span>
      </div>

      <div class="locked">Tipp und Analyse sind erst nach erfolgreicher Freischaltung sichtbar.</div>

      <div class="price">💎 ${preisUnits} Units</div>

      <button class="btn" onclick="freischalten('${tippId}')">
        Freischalten
      </button>

      <div class="small-note">
        Die vollständige Analyse wird nur für diesen Benutzer nach Freischaltung angezeigt.
      </div>
    </div>
  `;

  return card;
}

async function loadTipps() {
  const statusBox = document.getElementById("status");
  const tipsBox = document.getElementById("tips");

  try {
    const response = await fetch(TIPPS_WEBHOOK + "?cachebuster=" + Date.now(), {
      method: "GET",
      cache: "no-store"
    });

    const rawText = await response.text();

    if (!response.ok) {
      throw new Error("HTTP Fehler: " + response.status + "\n\nAntwort:\n" + rawText);
    }

    const tipps = parseWebhookJson(rawText);

    statusBox.style.display = "none";
    tipsBox.innerHTML = "";

    if (!Array.isArray(tipps) || tipps.length === 0) {
      tipsBox.innerHTML = `<div class="empty">Aktuell sind keine neuen Tipps verfügbar.</div>`;
      return;
    }

    tipps.forEach(tipp => {
      tipsBox.appendChild(createTipCard(tipp));
    });

  } catch (error) {
    statusBox.style.display = "none";
    tipsBox.innerHTML = `
      <div class="error">
Fehler beim Laden der Tipps:

${error.message}
      </div>
    `;
    console.error(error);
  }
}

function freischalten(tippId) {
  alert("Freischaltung kommt im nächsten Schritt. Tipp-ID: " + tippId);
}

loadTipps();
</script>

</body>
</html>
