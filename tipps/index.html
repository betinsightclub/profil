<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetInsight Tipps</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: #071d2b;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
  }

  .page {
    max-width: 1050px;
    margin: 0 auto;
    padding: 35px 18px 70px;
  }

  .logo {
    width: 150px;
    max-width: 70%;
    height: auto;
    margin-bottom: 28px;
  }

  h1 {
    margin: 8px 0 8px;
    font-size: 32px;
  }

  .subtitle {
    color: #b8d7e8;
    margin-bottom: 34px;
    font-size: 16px;
  }

  .status {
    color: #8fd3ff;
    margin: 25px 0;
  }

  .tips-grid {
    display: grid;
    gap: 28px;
  }

  .tip-card {
    background: linear-gradient(180deg, #0b3344, #0d4658);
    border: 1px solid rgba(35, 190, 255, 0.45);
    border-radius: 20px;
    padding: 32px 26px;
    box-shadow: 0 16px 35px rgba(0,0,0,0.35);
    max-width: 760px;
    width: 100%;
    margin: 0 auto;
  }

  .tip-card h2 {
    margin: 0 0 22px;
    font-size: 30px;
    line-height: 1.25;
  }

  .tip-meta {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 16px 22px;
    color: #e4f7ff;
    font-size: 15px;
    border-bottom: 2px solid #19c8f5;
    padding-bottom: 20px;
    margin-bottom: 20px;
  }

  .locked {
    color: #a9c9d8;
    font-size: 14px;
    margin: 15px 0;
  }

  .price {
    font-size: 24px;
    margin: 16px 0 20px;
  }

  .btn {
    display: inline-block;
    background: linear-gradient(90deg, #16a8ff, #00c8ff);
    color: white;
    text-decoration: none;
    border: none;
    border-radius: 13px;
    padding: 14px 42px;
    font-size: 16px;
    cursor: pointer;
    min-width: 240px;
    box-shadow: 0 10px 22px rgba(0, 174, 255, 0.28);
  }

  .btn:hover {
    opacity: 0.92;
  }

  .small-note {
    color: #b8d7e8;
    font-size: 13px;
    margin-top: 14px;
  }

  .empty,
  .error {
    max-width: 760px;
    margin: 0 auto;
    border-radius: 18px;
    padding: 24px;
  }

  .empty {
    background: #0f3040;
    color: #c9e8f5;
  }

  .error {
    background: #3d1e25;
    color: #ffd7d7;
    border: 1px solid #ff6b6b;
    white-space: pre-wrap;
    text-align: left;
  }

  @media (max-width: 600px) {
    .page {
      padding: 25px 14px 50px;
    }

    h1 {
      font-size: 26px;
    }

    .tip-card {
      padding: 26px 18px;
    }

    .tip-card h2 {
      font-size: 24px;
    }

    .btn {
      width: 100%;
      min-width: unset;
    }
  }
</style>
</head>

<body>
  <div class="page">
    <img src="../logo_betisight.club.png" alt="BetInsight Club" class="logo">

    <h1>🔥 Neue BetInsight Tipps</h1>
    <p class="subtitle">Hier siehst du alle aktuell veröffentlichten Tipps als Vorschau.</p>

    <div id="status" class="status">Tipps werden geladen...</div>
    <div id="tips" class="tips-grid"></div>
  </div>

<script>
const TIPPS_WEBHOOK = "https://hook.eu1.make.com/36gm8kvlfcb7jwae8ypxe8oripquonq5";

function safeText(value, fallback = "-") {
  if (value === null || value === undefined || value === "") return fallback;
  return String(value);
}

function formatDate(value) {
  if (!value) return "-";

  const date = new Date(value);
  if (!isNaN(date.getTime())) {
    return date.toLocaleDateString("de-DE");
  }

  return value;
}

function parseWebhookJson(rawText) {
  let cleaned = String(rawText).replace(/^\uFEFF/, "").trim();

  const firstBracket = cleaned.indexOf("[");
  const lastBracket = cleaned.lastIndexOf("]");

  if (firstBracket === -1 || lastBracket === -1 || lastBracket <= firstBracket) {
    throw new Error("Keine gültige JSON-Liste gefunden.\n\nAntwort vom Webhook:\n" + rawText);
  }

  cleaned = cleaned.substring(firstBracket, lastBracket + 1).trim();

  return JSON.parse(cleaned);
}

function createTipCard(tipp) {
  const card = document.createElement("div");
  card.className = "tip-card";

  const tippId = safeText(tipp.tipp_id, "");
  const spiel = safeText(tipp.spiel);
  const liga = safeText(tipp.liga);
  const markt = safeText(tipp.markt);
  const quote = safeText(tipp.quote);
  const preisUnits = safeText(tipp.preis_units);
  const spielDatum = formatDate(tipp.spiel_datum);
  const anpfiff = safeText(tipp.anpfiff);

  card.innerHTML = `
    <h2>${spiel}</h2>

    <div class="tip-meta">
      <span>🏆 ${liga}</span>
      <span>📅 ${spielDatum}</span>
      <span>⏰ ${anpfiff}</span>
      <span>📊 ${markt}</span>
      <span>📈 ${quote}</span>
    </div>

    <div class="locked">🔒 Tipp und Analyse sind erst nach Freischaltung sichtbar.</div>

    <div class="price">💎 ${preisUnits} Units</div>

    <button class="btn" onclick="freischalten('${tippId}')">
      Freischalten
    </button>

    <div class="small-note">
      Die vollständige Analyse wird erst nach erfolgreicher Freischaltung angezeigt.
    </div>
  `;

  return card;
}

async function loadTipps() {
  const statusBox = document.getElementById("status");
  const tipsBox = document.getElementById("tips");

  try {
    const response = await fetch(TIPPS_WEBHOOK + "?cachebuster=" + Date.now(), {
      method: "GET",
      cache: "no-store"
    });

    const rawText = await response.text();

    if (!response.ok) {
      throw new Error("HTTP Fehler: " + response.status + "\n\nAntwort:\n" + rawText);
    }

    const tipps = parseWebhookJson(rawText);

    statusBox.style.display = "none";
    tipsBox.innerHTML = "";

    if (!Array.isArray(tipps) || tipps.length === 0) {
      tipsBox.innerHTML = `<div class="empty">Aktuell sind keine neuen Tipps verfügbar.</div>`;
      return;
    }

    tipps.forEach(tipp => {
      tipsBox.appendChild(createTipCard(tipp));
    });

  } catch (error) {
    statusBox.style.display = "none";
    tipsBox.innerHTML = `
      <div class="error">
Fehler beim Laden der Tipps:

${error.message}
      </div>
    `;
    console.error(error);
  }
}

function freischalten(tippId) {
  alert("Freischaltung kommt im nächsten Schritt. Tipp-ID: " + tippId);
}

loadTipps();
</script>

</body>
</html>
